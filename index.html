
<!DOCTYPE html>
<html>
<head>
<title>Navigation Fix</title>
<style>
.bottom-nav {position:fixed;bottom:0;width:100%;display:flex;justify-content:space-around;background:#111;padding:10px;}
.bottom-nav button {color:white;background:none;border:none;font-size:16px}
.active {color:#00eaff;}
.section {display:none;padding:20px}
</style>
</head>
<body>

<div id="shopSection" class="section">SHOP CONTENT</div>
<div id="categorySection" class="section">CATEGORY CONTENT</div>
<div id="promoSection" class="section">PROMO CONTENT</div>
<div id="cartSection" class="section">CART CONTENT</div>
<div id="meSection" class="section">ME CONTENT</div>

<div class="bottom-nav">
  <button onclick="showTab(event,'shop')">Shop</button>
  <button onclick="showTab(event,'category')">Category</button>
  <button onclick="showTab(event,'promos')">Promos</button>
  <button onclick="showTab(event,'cart')">Cart</button>
  <button onclick="showTab(event,'me')">Me</button>
</div>

<script>
function showTab(e, tab){
  document.querySelectorAll('.section').forEach(s=>s.style.display='none');
  document.querySelectorAll('.bottom-nav button').forEach(b=>b.classList.remove('active'));

  if(tab==='shop') document.getElementById('shopSection').style.display='block';
  if(tab==='category') document.getElementById('categorySection').style.display='block';
  if(tab==='promos') document.getElementById('promoSection').style.display='block';
  if(tab==='cart') document.getElementById('cartSection').style.display='block';
  if(tab==='me') document.getElementById('meSection').style.display='block';

  e.target.classList.add('active');
}

// default
document.getElementById('shopSection').style.display='block';
</script>

</body>
</html>
