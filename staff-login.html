<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mr Vape Shop Staff Login</title>
  <link rel="stylesheet" href="./styles-v3.css" />
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-brand">MR VAPE SHOP STAFF</div>
      <h1>Staff Login</h1>
      <p class="login-sub">Cashier access only. Opens Barcode POS after login.</p>
      <form id="adminLoginForm" class="login-form">
        <label>Email<input id="loginEmail" type="email" placeholder="cashier@email.com" required /></label>
        <label>Password<input id="loginPassword" type="password" placeholder="Enter password" required /></label>
        <button type="submit" class="btn dark full-btn">Login to POS</button>
      </form>
      <div class="notes"><p><strong>Staff only:</strong> This account must have <code>role: "staff"</code> in Firestore users collection.</p></div>
      <a href="./index.html" class="btn ghost full-btn login-back">Back to Customer Page</a>
    </div>
  </div>
  <div class="notice" id="notice"></div>
  <script type="module" src="./app-v3.js"></script>
</body>
</html>
